<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rainer's App</title>

<style>
    body {
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #fef3f7;
    }

    .card {
      background: white;
      padding: 2rem 3rem;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgb(0 0 0 / 10%);
      text-align: center;
    }

    h1 {
      color: #2d3748;
      margin-bottom: 0.5rem;
    }

    .version {
      font-size: 2rem;
      color: #48bb78;
      font-weight: bold;
    }

    .label {
      color: #718096;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }
  </style>

</head>
<body>
  <div class="card">
    <h1>My CI/CD App</h1>
    <div class="version">{{version}}</div>
    <div class="label">Current deployed version</div>
  </div>
</body>
</html>
